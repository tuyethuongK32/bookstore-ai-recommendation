<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">

<title>AI Bookstore</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<script async
src="https://www.googletagmanager.com/gtag/js?id=GA_ID">
</script>

<script>

window.dataLayer = window.dataLayer || [];

function gtag(){dataLayer.push(arguments);}

gtag('js', new Date());

gtag('config', 'GA_ID');

</script>

<body>

<!-- HEADER -->

<header class="header">

<div class="container header-flex">

<h2 class="logo">📚 AI Bookstore</h2>

<form action="/books" class="search-box">

<input type="text" name="search" placeholder="Tìm kiếm sách...">

<button type="submit">
<i class="fa fa-search"></i>
</button>

</form>

<a href="/cart" class="cart-btn">
<i class="fa fa-shopping-cart"></i>
Giỏ hàng
</a>

</div>

</header>


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-light bg-light">

<div class="container">

<ul class="navbar-nav">

<li class="nav-item">
<a class="nav-link" href="/">Trang chủ</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/books">Sách</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/blog">Blog</a>
</li>

</ul>

</div>

</nav>


<div class="container main-container">

{% block content %}

{% endblock %}

</div>


<footer class="footer">

<div class="container">

<p>© 2025 AI Bookstore - Website demo đồ án</p>

</div>

</footer>

</body>
</html>
