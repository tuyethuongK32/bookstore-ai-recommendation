{% extends "base.html" %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
  
  <div class="card shadow-lg p-4" style="width: 420px; border-radius: 16px;">
    
    <h3 class="text-center mb-4 fw-bold text-success">
      📝 Tạo tài khoản
    </h3>

    <form method="post">

      <!-- Họ tên -->
      <div class="mb-3">
        <label class="form-label">Họ và tên</label>
        <input name="full_name" class="form-control" placeholder="Nhập họ tên">
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input name="email" class="form-control" placeholder="example@gmail.com">
      </div>

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label">Tên đăng nhập</label>
        <input name="username" class="form-control" placeholder="username">
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Mật khẩu</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••">
      </div>

      <!-- Favorite category -->
      <div class="mb-3">
        <label class="form-label">Danh mục yêu thích</label>
        <select name="favorite_category" class="form-select">
          <option value="">-- Chọn danh mục --</option>
          {% for c in categories %}
            <option>{{ c.category }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Button -->
      <button class="btn btn-success w-100 py-2">
        Đăng ký
      </button>

    </form>

    <!-- Link login -->
    <div class="text-center mt-3">
      <small>
        Đã có tài khoản?
        <a href="/login" class="text-decoration-none">Đăng nhập</a>
      </small>
    </div>

  </div>

</div>

{% endblock %}
