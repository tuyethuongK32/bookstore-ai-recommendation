{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h4 class="mb-0">
<i class="fa fa-credit-card"></i>
Thanh toán đơn hàng
</h4>

</div>

<div class="card-body">

{% if success %}

<div class="text-center">

<h3 class="text-success">
<i class="fa fa-check-circle"></i>
Đặt hàng thành công
</h3>

<p>
Cảm ơn bạn đã mua sách tại AI Bookstore.
</p>

<a href="/" class="btn btn-primary mt-3">
Quay về trang chủ
</a>

</div>

{% else %}

<div class="alert alert-secondary">

<b>Tổng tiền đơn hàng:</b>

<span class="text-danger">
{{ "{:,.0f}".format(total) }} đ
</span>

</div>

<form method="post">

<div class="mb-3">

<label class="form-label">
Họ và tên
</label>

<input
type="text"
name="name"
class="form-control"
placeholder="Nhập họ tên"
required>

</div>


<div class="mb-3">

<label class="form-label">
Số điện thoại
</label>

<input
type="tel"
name="phone"
class="form-control"
pattern="[0-9]{9,11}"
placeholder="Nhập số điện thoại"
required>

</div>


<div class="mb-3">

<label class="form-label">
Địa chỉ giao hàng
</label>

<textarea
name="address"
class="form-control"
rows="3"
placeholder="Nhập địa chỉ giao hàng"
required></textarea>

</div>


<button
type="submit"
class="btn btn-success w-100">

<i class="fa fa-check"></i>
Đặt hàng

</button>

</form>

{% endif %}

</div>

</div>

</div>

</div>

{% endblock %}
