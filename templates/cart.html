{% extends "base.html" %}

{% block content %}

<h3 class="section-title">Giỏ hàng</h3>

<table class="table">

<tr>
<th>Sách</th>
<th>Giá</th>
</tr>

{% for book in books %}

<tr>

<td>{{ book.title }}</td>

<td class="price">{{ book.price }} đ</td>

</tr>

{% endfor %}

</table>

<h4>Tổng: {{ total }} đ</h4>

<a href="/checkout"
class="btn btn-success">

Thanh toán

</a>

{% endblock %}
